name: Build

on:
    workflow_call:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install D2
              run: curl -fsSL https://d2lang.com/install.sh | sh -s --

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - run: npm ci
            - run: npm run build

            - name: Upload dist
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/
